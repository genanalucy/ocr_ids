seed: 42
output_dir: ${OCR_IDS_RUNS_ROOT}/dinov2_vits_flat_v1

task:
  scope: flat-structure-v1

data:
  train_manifest: ${OCR_IDS_DATA_ROOT}/processed/rendered-v1/train/flat-v1-train.jsonl
  validation_manifest: ${OCR_IDS_DATA_ROOT}/processed/rendered-v1/validation/flat-v1-validation.jsonl
  image_size: 224

model:
  encoder_name: vit_small_patch14_dinov2.lvd142m
  pretrained: true
  encoder_checkpoint: null
  decoder_dim: 384
  decoder_layers: 6
  decoder_heads: 6
  max_length: 8

training:
  # Per GPU. Global batch = 96 × 4 = 384.
  batch_size: 96
  epochs: 40
  learning_rate: 0.0003
  weight_decay: 0.05
  num_workers: 8
  precision: bf16
  gradient_accumulation_steps: 1
  log_every: 20
